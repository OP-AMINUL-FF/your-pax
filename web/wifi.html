<h1>Wi-Fi Attacks</h1>

<div class="toolbar">
<button class="btn-green" onclick="scanNetworks()">Scan Networks</button>
<button class="btn-orange" onclick="toggleMonitor()">Toggle Monitor</button>
<button class="btn-blue" onclick="checkMonitor()">Check Monitor</button>
<span id="monStatus"><span class="status-dot off"></span>Monitor</span>
<span id="netCount">(0 networks)</span>
</div>
<div id="conflictBar" style="display:none;background:#330000;border:1px solid #660000;border-radius:4px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#ff6666"></div>

<div class="card">
<h2>Available Networks</h2>
<div style="max-height:500px;overflow-y:auto">
<table><thead><tr>
<th>#</th><th>SSID</th><th>BSSID</th><th>Ch</th><th>Signal</th><th>Security</th><th>WPS</th><th>Action</th>
</tr></thead>
<tbody id="netTableBody">
<tr><td colspan="8" style="text-align:center;color:#666;padding:30px">Click "Scan Networks" to discover Wi-Fi networks<br>Select a target to launch attacks</td></tr>
</tbody></table>

</div>

<script>
function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function showConflict(msg) {
    const bar = document.getElementById('conflictBar');
    if(msg) { bar.textContent = msg; bar.style.display = 'block'; }
    else { bar.style.display = 'none'; }
}
function checkConflicts(callback) {
    fetch('/conflict_status').then(r=>r.json()).then(s=>{
        const warnings = [];
        if(s.evil_ap_running) warnings.push('Evil AP is running');
        if(s.monitor_mode && !s.handshake_running && !s.pmkid_running) warnings.push('Monitor mode is active (Wi-Fi scan needs managed mode)');
        if(s.oneshot_running) warnings.push('WPS attack is running');
        showConflict(warnings.length ? '⚠ Conflict: ' + warnings.join(', ') : '');
        if(callback) callback(s);
    }).catch(()=>{ if(callback) callback({}); });
}
function scanNetworks() {
    var tbody = document.getElementById('netTableBody');
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#ff0;padding:20px">Scanning...</td></tr>';
    fetch('/wifi_scan_advanced').then(function(r){
        if(r.status == 409) return r.json().then(function(d){ tbody.innerHTML = '<tr><td colspan="8" style="color:#f66;padding:20px">'+escapeHtml(d.error)+'</td></tr>'; });
        return r.json();
    }).then(function(networks){
        tbody.innerHTML = '';
        var seen = {};
        var idx = 0;
        networks.forEach(function(n){
            var key = (n.bssid||'') + (n.ssid||'');
            if (seen[key] || !key) return;
            seen[key] = true;
            if (!n.bssid && !n.ssid) return;
            idx++;
            var sig = parseInt(n.signal) || -100;
            var sigColor = sig > -50 ? '#0f0' : sig > -70 ? '#ff0' : '#f66';
            var bars = sig > -50 ? '\u2582\u2584\u2586\u2588' : sig > -60 ? '\u2582\u2584\u2586' : sig > -70 ? '\u2582\u2584' : '\u2582';
            var ssid = n.ssid ? escapeHtml(n.ssid) : '<i style="color:#666">Hidden</i>';
            var sec = n.wpa ? '<span class="badge badge-wpa2">WPA2</span>' : '<span class="badge badge-open">OPEN</span>';
            var wps = n.wps ? '<span class="badge badge-wps">WPS</span>' : '-';
            var bssid = escapeHtml(n.bssid || '??:??:??:??:??:??');
            var ch = escapeHtml(n.channel || '?');
            var sigDisp = escapeHtml(n.signal || '?');
            var row = document.createElement('tr');
            row.addEventListener('click', function() {
                selectTarget(
                    encodeURIComponent(n.bssid || ''),
                    encodeURIComponent(n.ssid || ''),
                    encodeURIComponent(n.channel || ''),
                    encodeURIComponent(n.signal || '0')
                );
            });
            row.innerHTML = '<td style="color:#666">' + idx + '</td>' +
                '<td><strong>' + ssid + '</strong></td>' +
                '<td style="font-size:11px;color:#888">' + bssid + '</td>' +
                '<td>' + ch + '</td>' +
                '<td style="color:' + sigColor + ';font-size:13px">' + bars + ' ' + sigDisp + '</td>' +
                '<td>' + sec + '</td>' +
                '<td>' + wps + '</td>' +
                '<td><button class="btn-sm btn-blue" data-bssid="' + encodeURIComponent(n.bssid || '') + '" data-ssid="' + encodeURIComponent(n.ssid || '') + '" data-channel="' + encodeURIComponent(n.channel || '') + '" data-signal="' + encodeURIComponent(n.signal || '0') + '">Attack</button></td>';
            row.querySelector('button').addEventListener('click', function(e) {
                e.stopPropagation();
                selectTarget(this.dataset.bssid, this.dataset.ssid, this.dataset.channel, this.dataset.signal);
            });
            tbody.appendChild(row);
        });
        if (idx === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#666;padding:20px">No networks found. Try scanning again.</td></tr>';
        }
        document.getElementById('netCount').textContent = '(' + idx + ' networks)';
    }).catch(function(e){
        document.getElementById('netTableBody').innerHTML = '<tr><td colspan="8" style="color:#f00;padding:20px">Error: ' + escapeHtml(e.message) + '</td></tr>';
    });
}
        document.getElementById('netTableBody').innerHTML = html;
        document.getElementById('netCount').textContent = `(${idx} networks)`;
    }).catch(e=>{
        document.getElementById('netTableBody').innerHTML = '<tr><td colspan="8" style="color:#f00;padding:20px">Error: ' + escapeHtml(e.message) + '</td></tr>';
    });
}

function selectTarget(bssid, ssid, channel, signal) {
    window.location.href = `wifi_target.html?bssid=${encodeURIComponent(bssid)}&ssid=${encodeURIComponent(ssid)}&channel=${encodeURIComponent(channel)}&signal=${encodeURIComponent(signal)}`;
}

function toggleMonitor() {
    fetch('/load_config').then(r=>r.json()).then(cfg=>{
        const current = cfg.enable_monitor_mode === true;
        fetch('/save_config', {method:'POST', body:JSON.stringify({enable_monitor_mode: !current})})
            .then(()=>{
                const on = !current;
                document.getElementById('monStatus').textContent = on ? 'Monitor' : 'Monitor';
                document.querySelector('#monStatus .status-dot').className = 'status-dot ' + (on ? 'on' : 'off');
                if (!on) {
                    document.getElementById('netTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:#666;padding:20px">Monitor mode off</td></tr>';
                }
            });
    });
}

function checkMonitor() {
    fetch('/evil_ap_status').then(()=>{
        document.getElementById('monStatus').textContent = 'Monitor OK';
        document.querySelector('#monStatus .status-dot').className = 'status-dot on';
    }).catch(()=>{
        document.getElementById('monStatus').textContent = 'Monitor Off';
        document.querySelector('#monStatus .status-dot').className = 'status-dot off';
    });
}
</script>
